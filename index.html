<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L10: RevOps — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F6F7F9;
      --surface: #FFFFFF;
      --surface-2: #F1F3F5;
      --surface-3: #E8EBEF;
      --ink: #0F1419;
      --ink-soft: #1F2937;
      --muted: #6B7280;
      --muted-2: #9CA3AF;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      --accent: #0B7A54;
      --accent-soft: #D1F2E3;
      --urgent: #C43025;
      --urgent-soft: #FEE4E2;
      --warning: #B87309;
      --warning-soft: #FEF0C7;
      --info: #2E5DA8;
      --info-soft: #DCE7F7;
      --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04);
      --shadow-md: 0 4px 12px rgba(17, 24, 39, 0.06), 0 1px 3px rgba(17, 24, 39, 0.05);
      --shadow-menu: 0 10px 32px rgba(17, 24, 39, 0.10), 0 2px 6px rgba(17, 24, 39, 0.05);
      --sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'Geist Mono', 'SF Mono', ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'ss01', 'cv11';
    }

    body { min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 32px 40px 72px;
    }

    /* Header */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .title-block h1 {
      font-weight: 700;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--ink);
    }

    .title-block h1 .accent {
      color: var(--accent);
      font-weight: 700;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 400;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      min-width: 0;
    }

    .status-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.01em;
      white-space: nowrap;
      font-weight: 500;
      box-sizing: border-box;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      position: relative;
    }

    .sync-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.3;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.8); opacity: 0; }
    }

    .sync-badge.syncing .sync-dot { background: var(--warning); }
    .sync-badge.syncing .sync-dot::after { background: var(--warning); }
    .sync-badge.error .sync-dot { background: var(--urgent); animation: none; }
    .sync-badge.error .sync-dot::after { display: none; }

    .me-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      border: 1px solid transparent;
      box-sizing: border-box;
    }

    .me-chip.is-empty {
      background: var(--surface);
      color: var(--muted);
      border-color: var(--border);
    }

    .me-chip:not(.is-empty) {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .me-chip:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .me-chip:not(.is-empty):hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Dropdown filter */
    .dropdown { position: relative; }

    .dropdown-trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px 7px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12.5px;
      color: var(--ink);
      font-weight: 500;
      transition: all 0.15s ease;
      white-space: nowrap;
      min-width: 160px;
      justify-content: space-between;
    }

    .dropdown-trigger:hover {
      border-color: var(--border-strong);
    }

    .dropdown.open .dropdown-trigger {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(15, 20, 25, 0.06);
    }

    .dropdown-trigger-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      min-width: 0;
      overflow: hidden;
    }

    .dropdown-label {
      color: var(--muted);
      font-weight: 600;
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.2;
    }

    .dropdown-value {
      color: var(--ink);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
      line-height: 1.25;
      font-size: 12.5px;
    }

    .dropdown-value.all {
      color: var(--muted);
      font-weight: 500;
    }

    .dropdown-chevron {
      width: 12px;
      height: 12px;
      color: var(--muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .dropdown.open .dropdown-chevron {
      transform: rotate(180deg);
      color: var(--ink);
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 240px;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-menu);
      padding: 6px;
      z-index: 50;
      opacity: 0;
      transform: translateY(-4px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      max-height: 360px;
      overflow-y: auto;
    }

    .dropdown.open .dropdown-menu {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--ink);
      text-align: left;
      transition: background 0.1s ease;
      font-weight: 500;
    }

    .dropdown-item:hover { background: var(--surface-2); }
    .dropdown-item.selected { background: var(--surface-2); }

    .dropdown-item.selected::after {
      content: '✓';
      color: var(--accent);
      font-weight: 700;
    }

    .dropdown-item[data-value=""] {
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      margin-bottom: 2px;
    }

    .dropdown-item[data-value=""]:hover,
    .dropdown-item[data-value=""].selected {
      color: var(--ink);
    }

    .clear-filters-link {
      font-size: 11.5px;
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 6px;
      transition: all 0.15s ease;
      background: none;
      border: 1px dashed var(--border-strong);
      font-weight: 500;
    }

    .clear-filters-link:hover {
      color: var(--urgent);
      border-color: var(--urgent);
    }

    .clear-filters-link[hidden] { display: none; }

    /* Section grid */
    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 1100px) {
      .header { grid-template-columns: 1fr; }
      .header-right { align-items: flex-start; }
    }

    @media (max-width: 960px) {
      .top-row { grid-template-columns: 1fr; }
      .container { padding: 20px 16px 56px; }
      .title-block h1 { font-size: 26px; }
      .dropdown-trigger { min-width: 0; }
      .dropdown-value { max-width: 100px; }
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
      animation: fadeInUp 0.4s ease backwards;
    }

    .section-head {
      padding: 16px 22px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .section-head-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .section-head h2 {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .section-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 5px;
      min-width: 22px;
      text-align: center;
      display: inline-block;
    }

    .section-note {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .section-body { padding: 6px; }

    .section.attention .section-head {
      background: linear-gradient(90deg, var(--urgent-soft) 0%, var(--surface-2) 70%);
      border-bottom-color: #F5C9C4;
    }
    .section.attention .section-head h2 { color: var(--urgent); }

    .section.intake .section-head {
      background: linear-gradient(90deg, var(--info-soft) 0%, var(--surface-2) 70%);
      border-bottom-color: #BBCEEA;
    }
    .section.intake .section-head h2 { color: var(--info); }

    /* Task list */
    .tasks { display: flex; flex-direction: column; }

    .task {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 8px;
      transition: background 0.12s ease;
      position: relative;
      cursor: pointer;
    }

    .task + .task { border-top: 1px solid var(--border); border-radius: 0; }
    .task:first-child { border-top: none; }
    .task:hover { background: var(--surface-2); }

    .task.urgent-task {
      background: linear-gradient(90deg, var(--urgent-soft) 0%, transparent 45%);
    }
    .task.urgent-task:hover {
      background: linear-gradient(90deg, var(--urgent-soft) 0%, var(--surface-2) 45%);
    }

    .task.mine {
      background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 60%);
    }
    .task.mine:hover {
      background: linear-gradient(90deg, var(--accent-soft) 0%, var(--surface-2) 60%);
    }

    .task.mine::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .task-main { min-width: 0; }

    .task-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.35;
      margin-bottom: 6px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      letter-spacing: -0.005em;
    }

    .mine-badge {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1.4;
    }

    .urgent-badge {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--urgent);
      background: var(--surface);
      border: 1px solid var(--urgent);
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1.4;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--ink-soft);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .tag.team { background: var(--surface); }

    .tag.status[data-status="In Progress"] { background: var(--warning-soft); border-color: transparent; color: var(--warning); }
    .tag.status[data-status="In Review / Scoping"] { background: var(--info-soft); border-color: transparent; color: var(--info); }
    .tag.status[data-status="Not Started / New Request"] { background: var(--surface-2); color: var(--muted); }
    .tag.status[data-status="Stalled / Blocked"] { background: var(--urgent-soft); border-color: transparent; color: var(--urgent); }
    .tag.status[data-status="Completed "] { background: var(--accent-soft); border-color: transparent; color: var(--accent); }
    .tag.status[data-status="Deprioritized"] { background: var(--surface-2); color: var(--muted-2); text-decoration: line-through; }

    .tag.company, .tag.vertical { color: var(--muted); font-weight: 500; }

    .task-side {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      min-width: 100px;
    }

    .due {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.01em;
      font-weight: 500;
    }

    .due.soon { color: var(--warning); font-weight: 600; }
    .due.overdue { color: var(--urgent); font-weight: 700; }
    .due.today { color: var(--accent); font-weight: 600; }

    .external {
      font-size: 10.5px;
      color: var(--muted-2);
      opacity: 0;
      transition: opacity 0.15s ease;
      font-family: var(--mono);
      font-weight: 500;
    }

    .task:hover .external { opacity: 1; }

    .empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .empty::before {
      content: '';
      display: block;
      width: 28px;
      height: 2px;
      background: var(--border-strong);
      margin: 0 auto 10px;
      border-radius: 2px;
    }

    .skeleton { padding: 13px 16px; }
    .skeleton + .skeleton { border-top: 1px solid var(--border); }

    .skel-bar {
      height: 14px;
      background: linear-gradient(90deg, var(--surface-2) 0%, var(--border) 50%, var(--surface-2) 100%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.4s ease-in-out infinite;
      margin-bottom: 8px;
    }
    .skel-bar.tags { width: 40%; height: 10px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 24px 4px 0;
      border-top: 1px solid var(--border);
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .footer a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink);
      font-weight: 600;
      font-size: 12.5px;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .footer a:hover {
      border-color: var(--ink);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .footer .arrow { transition: transform 0.2s ease; }
    .footer a:hover .arrow { transform: translateX(3px); }

    #section-new { animation-delay: 0.05s; }
    #section-urgent { animation-delay: 0.1s; }
    #section-progress { animation-delay: 0.15s; }
    #section-review { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-block">
        <h1>L10: <span class="accent">RevOps</span></h1>
        <div class="subtitle">Request intake &amp; workload dashboard · live from Asana</div>
      </div>

      <div class="header-right">
        <div class="status-row">
          <div class="sync-badge" id="sync-badge">
            <span class="sync-dot"></span>
            <span id="sync-text">Loading…</span>
          </div>
          <button class="me-chip is-empty" id="me-chip" title="Set your email to highlight tasks assigned to you">
            <span id="me-chip-text">Identify me</span>
          </button>
        </div>

        <div class="filter-row" id="filter-row">
          <button class="clear-filters-link" id="clear-filters" hidden>Clear</button>
        </div>
      </div>
    </header>

    <div class="top-row">
      <section class="section intake" id="section-new">
        <div class="section-head">
          <div class="section-head-left">
            <h2>New Requests</h2>
            <span class="section-count" id="count-new">0</span>
          </div>
          <span class="section-note">Needs intake review</span>
        </div>
        <div class="section-body"><div class="tasks" id="list-new"></div></div>
      </section>

      <section class="section attention" id="section-urgent">
        <div class="section-head">
          <div class="section-head-left">
            <h2>Urgent</h2>
            <span class="section-count" id="count-urgent">0</span>
          </div>
          <span class="section-note">Marked urgent — any status</span>
        </div>
        <div class="section-body"><div class="tasks" id="list-urgent"></div></div>
      </section>
    </div>

    <section class="section" id="section-progress">
      <div class="section-head">
        <div class="section-head-left">
          <h2>Current Workload</h2>
          <span class="section-count" id="count-progress">0</span>
        </div>
        <span class="section-note">In Progress · sorted by due date</span>
      </div>
      <div class="section-body"><div class="tasks" id="list-progress"></div></div>
    </section>

    <section class="section" id="section-review">
      <div class="section-head">
        <div class="section-head-left">
          <h2>Up Next</h2>
          <span class="section-count" id="count-review">0</span>
        </div>
        <span class="section-note">In Review / Scoping</span>
      </div>
      <div class="section-body"><div class="tasks" id="list-review"></div></div>
    </section>

    <footer class="footer">
      <div id="footer-stats">—</div>
      <a href="./completed.html">
        <span>Completed tasks</span>
        <span class="arrow">→</span>
      </a>
    </footer>
  </div>

  <script>
    // ============================================================
    // Config
    // ============================================================
    const API_ENDPOINT = '/api/get-tasks?scope=active';
    const REFRESH_MS = 60 * 1000;

    const FILTERS = [
      {
        key: 'company',
        label: 'Company',
        options: [
          'Breakthrough Closing (BTC)',
          'AIMS',
          'Modern Amenities (National Accts)',
          'MedPro',
          'Other (Not Listed)',
        ],
      },
      {
        key: 'btc_vertical',
        label: 'BTC Vertical',
        options: [
          'Vendingpreneurs (VP)',
          'Ben Kelly (BK)',
          'AI Managed Services (AIMS)',
        ],
      },
      {
        key: 'team',
        label: 'Team',
        options: [
          'Sales',
          'Marketing',
          'Operations / HR',
          'AIMS',
          'National Accounts (MA)',
          'Other',
        ],
      },
    ];

    const STATE = {
      tasks: [],
      filters: { company: null, btc_vertical: null, team: null },
      myEmail: localStorage.getItem('revops_me_email') || null,
      myName: localStorage.getItem('revops_me_name') || null,
    };

    // ============================================================
    // Utilities
    // ============================================================
    function formatDue(due_on) {
      if (!due_on) return { text: 'No due date', cls: '' };
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const [y, m, d] = due_on.split('-').map(Number);
      const due = new Date(y, m - 1, d);
      const diff = Math.round((due - today) / (1000 * 60 * 60 * 24));
      if (diff < 0) return { text: `Overdue ${Math.abs(diff)}d`, cls: 'overdue' };
      if (diff === 0) return { text: 'Due today', cls: 'today' };
      if (diff === 1) return { text: 'Due tomorrow', cls: 'soon' };
      if (diff <= 7) {
        const day = due.toLocaleDateString('en-US', { weekday: 'short' });
        return { text: `Due ${day}`, cls: 'soon' };
      }
      const text = due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return { text: `Due ${text}`, cls: '' };
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function shortTeam(team) {
      if (!team) return null;
      if (team === 'Operations / HR') return 'Ops / HR';
      if (team === 'National Accounts (MA)') return 'Nat\'l Accts';
      return team;
    }

    function shortCompany(c) {
      if (!c) return null;
      if (c === 'Breakthrough Closing (BTC)') return 'BTC';
      if (c === 'Modern Amenities (National Accts)') return 'Modern Amenities';
      if (c === 'Other (Not Listed)') return 'Other';
      return c;
    }

    function shortFilterValue(value) {
      if (!value) return 'All';
      if (value === 'Breakthrough Closing (BTC)') return 'BTC';
      if (value === 'Modern Amenities (National Accts)') return 'Modern Amenities';
      if (value === 'Other (Not Listed)') return 'Other';
      if (value === 'Vendingpreneurs (VP)') return 'Vendingpreneurs';
      if (value === 'Ben Kelly (BK)') return 'Ben Kelly';
      if (value === 'AI Managed Services (AIMS)') return 'AI Managed Svcs';
      if (value === 'Operations / HR') return 'Ops / HR';
      if (value === 'National Accounts (MA)') return 'Nat\'l Accts';
      return value;
    }

    // ============================================================
    // Dropdown filters
    // ============================================================
    const CHEVRON_SVG = `<svg class="dropdown-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,6 8,10 12,6"></polyline></svg>`;

    function renderFilters() {
      const container = document.getElementById('filter-row');
      const clearBtn = document.getElementById('clear-filters');
      container.querySelectorAll('.dropdown').forEach((el) => el.remove());

      FILTERS.forEach((def) => {
        const current = STATE.filters[def.key];
        const dd = document.createElement('div');
        dd.className = 'dropdown';
        dd.dataset.filterKey = def.key;
        dd.innerHTML = `
          <button class="dropdown-trigger" type="button">
            <div class="dropdown-trigger-inner">
              <span class="dropdown-label">${escapeHtml(def.label)}</span>
              <span class="dropdown-value ${current ? '' : 'all'}">${escapeHtml(shortFilterValue(current))}</span>
            </div>
            ${CHEVRON_SVG}
          </button>
          <div class="dropdown-menu" role="menu">
            <button class="dropdown-item ${!current ? 'selected' : ''}" data-value="" role="menuitem">All</button>
            ${def.options.map((opt) => `
              <button class="dropdown-item ${current === opt ? 'selected' : ''}" data-value="${escapeHtml(opt)}" role="menuitem">${escapeHtml(opt)}</button>
            `).join('')}
          </div>
        `;
        container.appendChild(dd);
      });

      wireDropdowns();
      clearBtn.hidden = !Object.values(STATE.filters).some((v) => v);
    }

    function wireDropdowns() {
      document.querySelectorAll('.dropdown').forEach((dd) => {
        const trigger = dd.querySelector('.dropdown-trigger');
        const menu = dd.querySelector('.dropdown-menu');

        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          const wasOpen = dd.classList.contains('open');
          document.querySelectorAll('.dropdown.open').forEach((o) => o.classList.remove('open'));
          if (!wasOpen) dd.classList.add('open');
        });

        menu.addEventListener('click', (e) => {
          const item = e.target.closest('.dropdown-item');
          if (!item) return;
          e.stopPropagation();
          const key = dd.dataset.filterKey;
          const value = item.dataset.value || null;
          STATE.filters[key] = value;
          dd.classList.remove('open');
          renderFilters();
          render();
        });
      });
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown.open').forEach((dd) => dd.classList.remove('open'));
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.dropdown.open').forEach((dd) => dd.classList.remove('open'));
      }
    });

    document.getElementById('clear-filters').addEventListener('click', (e) => {
      e.stopPropagation();
      STATE.filters = { company: null, btc_vertical: null, team: null };
      renderFilters();
      render();
    });

    // ============================================================
    // Identify me
    // ============================================================
    function renderMeChip() {
      const chip = document.getElementById('me-chip');
      const text = document.getElementById('me-chip-text');
      if (STATE.myName || STATE.myEmail) {
        chip.classList.remove('is-empty');
        text.textContent = STATE.myName ? `You · ${STATE.myName}` : STATE.myEmail;
      } else {
        chip.classList.add('is-empty');
        text.textContent = 'Identify me';
      }
    }

    document.getElementById('me-chip').addEventListener('click', (e) => {
      e.stopPropagation();
      const current = STATE.myEmail || '';
      const input = prompt(
        'Enter your work email to highlight tasks assigned to you.\n(Stored locally in this browser only — never sent anywhere.)\n\nLeave blank to clear.',
        current
      );
      if (input === null) return;
      const email = input.trim();
      if (!email) {
        localStorage.removeItem('revops_me_email');
        localStorage.removeItem('revops_me_name');
        STATE.myEmail = null;
        STATE.myName = null;
      } else {
        localStorage.setItem('revops_me_email', email.toLowerCase());
        STATE.myEmail = email.toLowerCase();
        inferMyName();
      }
      renderMeChip();
      render();
    });

    function inferMyName() {
      if (!STATE.myEmail) return;
      const local = STATE.myEmail.split('@')[0].toLowerCase();
      const localParts = local.split(/[.\-_]/);
      for (const t of STATE.tasks) {
        if (!t.assignee?.name) continue;
        const nameLower = t.assignee.name.toLowerCase();
        const nameParts = nameLower.split(/\s+/);
        const overlap = localParts.filter((p) => nameParts.some((n) => n.startsWith(p) || p.startsWith(n)));
        if (overlap.length >= 1) {
          STATE.myName = t.assignee.name;
          localStorage.setItem('revops_me_name', t.assignee.name);
          return;
        }
      }
    }

    function isMine(task) {
      if (!task.assignee) return false;
      if (STATE.myName && task.assignee.name === STATE.myName) return true;
      return false;
    }

    // ============================================================
    // Task filtering & render
    // ============================================================
    function passesFilters(task) {
      for (const key of Object.keys(STATE.filters)) {
        const val = STATE.filters[key];
        if (val && task.fields[key] !== val) return false;
      }
      return true;
    }

    function taskCardHtml(task) {
      const due = formatDue(task.due_on);
      const team = shortTeam(task.fields.team);
      const status = task.fields.status;
      const company = shortCompany(task.fields.company);
      const vertical = task.fields.btc_vertical;
      const mine = isMine(task);
      const urgent = task.fields.urgent === 'Yes';

      const tags = [];
      if (team) tags.push(`<span class="tag team">${escapeHtml(team)}</span>`);
      if (status) tags.push(`<span class="tag status" data-status="${escapeHtml(status)}">${escapeHtml(status.trim())}</span>`);
      if (company) tags.push(`<span class="tag company">${escapeHtml(company)}</span>`);
      if (vertical && STATE.filters.company === 'Breakthrough Closing (BTC)') {
        tags.push(`<span class="tag vertical">${escapeHtml(vertical)}</span>`);
      }

      const classes = ['task'];
      if (urgent) classes.push('urgent-task');
      if (mine) classes.push('mine');

      return `
        <div class="${classes.join(' ')}" data-task-url="${escapeHtml(task.url || '#')}">
          <div class="task-main">
            <div class="task-name">
              <span>${escapeHtml(task.name)}</span>
              ${urgent ? '<span class="urgent-badge">Urgent</span>' : ''}
              ${mine ? '<span class="mine-badge">You</span>' : ''}
            </div>
            <div class="task-meta">${tags.join('')}</div>
          </div>
          <div class="task-side">
            <span class="due ${due.cls}">${escapeHtml(due.text)}</span>
            <span class="external">Open in Asana ↗</span>
          </div>
        </div>
      `;
    }

    function emptyState(msg) {
      return `<div class="empty">${escapeHtml(msg)}</div>`;
    }

    function renderSection(id, tasks, emptyMsg) {
      const list = document.getElementById(`list-${id}`);
      const count = document.getElementById(`count-${id}`);
      count.textContent = tasks.length;
      list.innerHTML = tasks.length === 0 ? emptyState(emptyMsg) : tasks.map(taskCardHtml).join('');
    }

    function render() {
      const visible = STATE.tasks.filter(passesFilters);

      const newReq = visible.filter((t) => t.section?.name === 'New Requests / Needs Review');
      const urgent = visible.filter((t) => t.fields.urgent === 'Yes');
      const inProg = visible
        .filter((t) => t.fields.status === 'In Progress')
        .sort((a, b) => {
          if (!a.due_on && !b.due_on) return 0;
          if (!a.due_on) return 1;
          if (!b.due_on) return -1;
          return a.due_on.localeCompare(b.due_on);
        });
      const review = visible.filter((t) => t.fields.status === 'In Review / Scoping');

      renderSection('new', newReq, 'Inbox zero. No new requests.');
      renderSection('urgent', urgent, 'Nothing urgent right now.');
      renderSection('progress', inProg, 'No active work in progress.');
      renderSection('review', review, 'Nothing pending review.');

      const yourCount = visible.filter(isMine).length;
      const totalCount = visible.length;
      const meText = STATE.myName ? ` · ${yourCount} assigned to you` : '';
      document.getElementById('footer-stats').textContent =
        `${totalCount} active ${totalCount === 1 ? 'task' : 'tasks'} visible${meText}`;
    }

    // ============================================================
    // Data fetching
    // ============================================================
    async function fetchTasks() {
      const badge = document.getElementById('sync-badge');
      const text = document.getElementById('sync-text');
      badge.classList.remove('error');
      badge.classList.add('syncing');
      text.textContent = 'Syncing…';

      try {
        const res = await fetch(API_ENDPOINT, { cache: 'no-store' });
        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        STATE.tasks = data.tasks || [];
        if (STATE.myEmail && !STATE.myName) inferMyName();
        render();
        badge.classList.remove('syncing');
        text.textContent = `Synced · ${formatTime(data.fetched_at)}`;
      } catch (err) {
        console.error('Fetch error:', err);
        badge.classList.remove('syncing');
        badge.classList.add('error');
        text.textContent = 'Sync failed';
      }
    }

    document.addEventListener('click', (e) => {
      const task = e.target.closest('.task');
      if (task && task.dataset.taskUrl && task.dataset.taskUrl !== '#') {
        window.open(task.dataset.taskUrl, '_blank', 'noopener');
      }
    });

    function renderSkeletons() {
      const skel = Array(3).fill(0).map(() => `
        <div class="skeleton">
          <div class="skel-bar" style="width: 70%"></div>
          <div class="skel-bar tags"></div>
        </div>
      `).join('');
      ['new', 'urgent', 'progress', 'review'].forEach((id) => {
        document.getElementById(`list-${id}`).innerHTML = skel;
      });
    }

    // Init
    renderFilters();
    renderMeChip();
    renderSkeletons();
    fetchTasks();
    setInterval(fetchTasks, REFRESH_MS);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') fetchTasks();
    });
  </script>
</body>
</html>
